site_name: LetsBuild
site_description: Autonomous Portfolio Factory — JD in, published GitHub repo out.
site_url: https://yashb98.github.io/LetsBuild
repo_url: https://github.com/yashb98/LetsBuild
repo_name: yashb98/LetsBuild

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
  - Architecture:
      - Overview: architecture/ARCHITECTURE.md
      - Data Flow: architecture/DATA_FLOW.md
      - 10 Layers: architecture/layers.md
      - 23 Patterns: architecture/patterns.md
  - Skills:
      - Authoring Guide: contributing/SKILL_AUTHORING.md
      - Skill Reference: skills/reference.md
  - Contributing:
      - Guide: contributing/guide.md
      - Claude Code Setup: contributing/claude-code.md
  - API Reference: api/reference.md
  - Decisions:
      - ADR Index: decisions/index.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
